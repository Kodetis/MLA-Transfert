name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ── Rust + wasm-pack ───────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable (2026-03-27)
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mla-wasm/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('mla-wasm/Cargo.lock') }}

      - name: Install wasm-pack (pinned)
        run: cargo install wasm-pack --locked --version 0.13.1

      - name: Build mla-wasm
        working-directory: mla-wasm
        run: wasm-pack build --target web --release

      # ── Node + Astro ───────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mla-transfert-web/package-lock.json

      - name: Install dependencies
        working-directory: mla-transfert-web
        run: npm ci

      - name: Build frontend
        working-directory: mla-transfert-web
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
        run: npm run build

      # ── Deploy ─────────────────────────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        working-directory: mla-transfert-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name mla-transfert-web --branch main --commit-message "CI deploy ${GITHUB_SHA::8}"
